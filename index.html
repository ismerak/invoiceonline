
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធចេញវិក័យប័ត្រអនឡាញ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Freehand&family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
        }
        @media print {
            .no-print {
                display: none;
            }
            .print-container {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
            }
            body {
                background-color: white;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 no-print">
            <h1 class="text-2xl font-bold text-blue-800 mb-4 md:mb-0">បង្កើតវិក័យប័ត្រអនឡាញ</h1>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    បោះពុម្ពវិក័យប័ត្រ
                </button>
                <button onclick="resetForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg shadow transition">
                    សម្អាតថ្មី
                </button>
            </div>
        </div>

        <!-- Invoice Card -->
        <div id="invoice" class="bg-white p-8 rounded-xl shadow-lg print-container border border-gray-100">
            
            <!-- Company Info & Logo -->
            <div class="flex justify-between items-start mb-8 border-b pb-6">
                <div>
                    <div class="w-16 h-16 bg-blue-600 rounded-lg mb-2 flex items-center justify-center text-white font-bold text-2xl">L</div>
                    <input type="text" placeholder="ឈ្មោះហាងរបស់អ្នក" class="text-xl font-bold block outline-none border-b border-transparent focus:border-blue-300 w-full" value="ហាងលក់ទំនិញអនឡាញ">
                    <input type="text" placeholder="អាសយដ្ឋាន/លេខទូរស័ព្ទ" class="text-sm text-gray-500 block outline-none border-b border-transparent focus:border-blue-300 w-full mt-1" value="ភ្នំពេញ, កម្ពុជា | 012 345 678">
                </div>
                <div class="text-right">
                    <h2 class="text-3xl font-bold text-gray-800 uppercase tracking-wider">វិក័យប័ត្រ</h2>
                    <p class="text-gray-500 mt-2">លេខ៖ #<span id="invoice-num">1001</span></p>
                    <p class="text-gray-500">កាលបរិច្ឆេទ៖ <span id="current-date"></span></p>
                </div>
            </div>

            <!-- Customer Details -->
            <div class="grid grid-cols-2 gap-8 mb-8">
                <div>
                    <h3 class="text-gray-400 font-bold uppercase text-xs mb-2">ព័ត៌មានអតិថិជន</h3>
                    <input type="text" placeholder="ឈ្មោះអតិថិជន" class="block font-semibold outline-none border-b border-gray-200 focus:border-blue-500 w-full py-1">
                    <input type="text" placeholder="លេខទូរស័ព្ទ" class="block text-sm outline-none border-b border-gray-200 focus:border-blue-500 w-full py-1 mt-1">
                </div>
            </div>

            <!-- Table -->
            <table class="w-full text-left mb-8">
                <thead>
                    <tr class="bg-gray-50 border-b border-t">
                        <th class="py-3 px-2 font-bold text-gray-700 w-1/2">ឈ្មោះទំនិញ</th>
                        <th class="py-3 px-2 font-bold text-gray-700 text-center">បរិមាណ</th>
                        <th class="py-3 px-2 font-bold text-gray-700 text-right">តម្លៃរាយ ($)</th>
                        <th class="py-3 px-2 font-bold text-gray-700 text-right">សរុប ($)</th>
                        <th class="py-3 px-2 font-bold text-gray-700 text-center no-print w-10"></th>
                    </tr>
                </thead>
                <tbody id="invoice-items">
                    <!-- Item row will go here -->
                </tbody>
            </table>

            <!-- Add Row Button -->
            <button onclick="addRow()" class="no-print bg-green-500 hover:bg-green-600 text-white px-4 py-1 rounded text-sm mb-8 transition">
                + បន្ថែមទំនិញ
            </button>

            <!-- Calculation -->
            <div class="flex justify-end">
                <div class="w-64">
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-500">សរុបរង៖</span>
                        <span id="subtotal" class="font-semibold">$0.00</span>
                    </div>
                    <div class="flex justify-between py-2 border-b items-center">
                        <span class="text-gray-500">បញ្ចុះតម្លៃ (%):</span>
                        <input type="number" id="discount" value="0" min="0" oninput="calculateTotal()" class="w-16 text-right outline-none border rounded px-1 text-sm no-print">
                        <span id="discount-display" class="hidden print:inline">0%</span>
                    </div>
                    <div class="flex justify-between py-3">
                        <span class="text-xl font-bold text-blue-800">សរុបចុងក្រោយ៖</span>
                        <span id="total" class="text-xl font-bold text-blue-800">$0.00</span>
                    </div>
                </div>
            </div>

            <!-- Footer Note -->
            <div class="mt-16 border-t pt-8 text-center text-gray-400 text-sm">
                <p>សូមអរគុណសម្រាប់ការគាំទ្រ!</p>
                <p class="mt-1 italic">ទំនិញទិញហើយមិនអាចប្តូរវិញបានទេ</p>
            </div>
        </div>
    </div>

    <script>
        // Set Date
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('km-KH');
        document.getElementById('invoice-num').textContent = Math.floor(Math.random() * 9000) + 1000;

        function addRow() {
            const tbody = document.getElementById('invoice-items');
            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-gray-50 transition";
            tr.innerHTML = `
                <td class="py-3 px-2">
                    <input type="text" placeholder="ឈ្មោះទំនិញ" class="w-full outline-none border-transparent focus:border-blue-300 bg-transparent">
                </td>
                <td class="py-3 px-2 text-center">
                    <input type="number" value="1" min="1" oninput="updateLineTotal(this)" class="qty w-16 text-center outline-none border-transparent focus:border-blue-300 bg-transparent">
                </td>
                <td class="py-3 px-2 text-right">
                    <input type="number" value="0.00" step="0.01" oninput="updateLineTotal(this)" class="price w-24 text-right outline-none border-transparent focus:border-blue-300 bg-transparent">
                </td>
                <td class="py-3 px-2 text-right font-semibold line-total">$0.00</td>
                <td class="py-3 px-2 text-center no-print">
                    <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
            calculateTotal();
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
            calculateTotal();
        }

        function updateLineTotal(input) {
            const row = input.closest('tr');
            const qty = row.querySelector('.qty').value;
            const price = row.querySelector('.price').value;
            const lineTotal = qty * price;
            row.querySelector('.line-total').textContent = `$${lineTotal.toFixed(2)}`;
            calculateTotal();
        }

        function calculateTotal() {
            let subtotal = 0;
            document.querySelectorAll('.line-total').forEach(el => {
                subtotal += parseFloat(el.textContent.replace('$', ''));
            });

            const discountPercent = document.getElementById('discount').value || 0;
            const discountAmount = subtotal * (discountPercent / 100);
            const total = subtotal - discountAmount;

            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
            document.getElementById('discount-display').textContent = `${discountPercent}%`;
        }

        function resetForm() {
            if(confirm('តើអ្នកពិតជាចង់សម្អាតព័ត៌មានទាំងអស់មែនទេ?')) {
                location.reload();
            }
        }

        // Initialize with one row
        window.onload = addRow;
    </script>
</body>
</html>
