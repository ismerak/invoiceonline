<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>វិក័យប័ត្រទូរស័ព្ទ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .item-input {
            border: none;
            background: transparent;
            padding: 12px 0;
            width: 100%;
        }
        .item-input:focus {
            outline: none;
        }
        .sticky-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 20px;
            z-index: 50;
        }
        @media print {
            .no-print { display: none !important; }
            .sticky-bottom { position: relative; box-shadow: none; padding: 10px 0; }
            body { background: white; }
            .main-card { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="pb-40">

    <div class="max-w-md mx-auto min-h-screen relative">
        
        <!-- Header -->
        <div class="p-6 flex justify-between items-center no-print">
            <h1 class="text-xl font-bold text-slate-800">វិក័យប័ត្រថ្មី</h1>
            <button onclick="window.print()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg active:scale-95 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-3a2 2 0 00-2-2H9a2 2 0 00-2 2v3a2 2 0 002 2zm0-10V4a2 2 0 012-2h4a2 2 0 012 2v4m-6 0h4" />
                </svg>
            </button>
        </div>

        <div class="main-card bg-white mx-4 rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <!-- Order Meta -->
            <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="inv-id">#000000</span>
                <span class="text-xs text-slate-500" id="inv-date">--/--/--</span>
            </div>

            <!-- Customer Field -->
            <div class="p-5 border-b border-slate-50">
                <input type="text" placeholder="ឈ្មោះអតិថិជន..." class="w-full text-lg font-semibold placeholder:text-slate-300 focus:outline-none border-none p-0">
            </div>

            <!-- Items List -->
            <div id="item-list" class="p-5 space-y-4">
                <!-- Row Template -->
            </div>

            <!-- Add Button -->
            <div class="p-5 no-print">
                <button onclick="addItem()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-medium hover:bg-slate-50 flex items-center justify-center gap-2 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-5v3a1 1 0 11-2 0v-3H5a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    បន្ថែមទំនិញ
                </button>
            </div>
        </div>

        <!-- Sticky Bottom Summary -->
        <div class="sticky-bottom max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4 px-2">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">សរុបចុងក្រោយ</p>
                    <p class="text-3xl font-black text-blue-600" id="total-display">$0.00</p>
                </div>
                <div class="text-right no-print">
                    <button onclick="location.reload()" class="text-xs font-bold text-red-400 uppercase">លុបចោល</button>
                </div>
            </div>
            
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition">
                    ចេញវិក័យប័ត្រ
                </button>
            </div>
        </div>

    </div>

    <script>
        // Setup Header
        document.getElementById('inv-date').textContent = new Date().toLocaleDateString('km-KH');
        document.getElementById('inv-id').textContent = '#' + Math.floor(100000 + Math.random() * 900000);

        function addItem() {
            const container = document.getElementById('item-list');
            const itemDiv = document.createElement('div');
            itemDiv.className = "flex items-start gap-3 pb-4 border-b border-slate-50 last:border-0 relative group";
            itemDiv.innerHTML = `
                <div class="flex-1">
                    <input type="text" placeholder="ឈ្មោះទំនិញ" class="item-input font-semibold text-slate-700">
                    <div class="flex gap-4">
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] font-bold text-slate-300 uppercase">Qty:</span>
                            <input type="number" value="1" min="1" oninput="calculate()" class="qty w-10 text-sm font-bold text-blue-600 focus:outline-none">
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] font-bold text-slate-300 uppercase">$:</span>
                            <input type="number" value="0.00" step="0.01" oninput="calculate()" class="price w-20 text-sm font-bold text-slate-600 focus:outline-none">
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm font-black text-slate-800 row-total">$0.00</p>
                    <button onclick="this.closest('div.flex').remove(); calculate()" class="no-print mt-2 text-red-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `;
            container.appendChild(itemDiv);
            calculate();
        }

        function calculate() {
            let total = 0;
            const rows = document.querySelectorAll('#item-list > div');
            
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const price = parseFloat(row.querySelector('.price').value) || 0;
                const rowTotal = qty * price;
                row.querySelector('.row-total').textContent = '$' + rowTotal.toFixed(2);
                total += rowTotal;
            });

            document.getElementById('total-display').textContent = '$' + total.toFixed(2);
        }

        // Add first row on load
        window.onload = addItem;
    </script>
</body>
</html>
