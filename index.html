<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>វិក័យប័ត្រសាមញ្ញ A4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        /* A4 Page Setup */
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 10px auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        @media print {
            body { background: none; padding: 0; }
            .page { margin: 0; box-shadow: none; border: none; width: 210mm; height: 297mm; padding: 15mm; }
            .no-print { display: none !important; }
        }

        input {
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        input:focus {
            border-bottom: 1px solid #3b82f6;
            outline: none;
            background-color: #f8fafc;
        }
        .qty-input { text-align: center; width: 60px; }
        .price-input { text-align: right; width: 110px; }
        
        table { border-collapse: separate; border-spacing: 0; }
        th { background-color: #f8fafc; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <!-- Controls -->
    <div class="max-w-[210mm] mx-auto mb-5 no-print flex justify-end gap-3 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <button onclick="location.reload()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-2.5 rounded-xl font-bold transition">
            ចាប់ផ្ដើមថ្មី
        </button>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 transition active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            បោះពុម្ពវិក័យប័ត្រ
        </button>
    </div>

    <!-- A4 Paper Content -->
    <div class="page">
        <!-- Minimal Header -->
        <div class="flex justify-between items-end mb-16 border-b-4 border-slate-900 pb-6">
            <div>
                <h1 class="text-5xl font-black text-slate-900 tracking-tighter uppercase">វិក័យប័ត្រ</h1>
                <p class="text-slate-400 mt-2 font-medium uppercase tracking-widest text-xs">Invoice Document</p>
            </div>
            <div class="text-right">
                <div class="space-y-1">
                    <p class="text-sm font-bold text-slate-800">លេខរៀង: <span id="inv-num" class="font-mono">#0000</span></p>
                    <p class="text-sm text-slate-500">ថ្ងៃខែឆ្នាំ: <span id="inv-date"></span></p>
                </div>
            </div>
        </div>

        <!-- Customer Section -->
        <div class="mb-12">
            <h3 class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-4">ព័ត៌មានអតិថិជន / Customer</h3>
            <div class="grid grid-cols-1 gap-4">
                <input type="text" placeholder="ឈ្មោះអតិថិជន (Customer Name)" class="text-2xl font-bold block w-full bg-transparent border-none placeholder:text-slate-200">
                <input type="text" placeholder="លេខទូរស័ព្ទ ឬ អាសយដ្ឋាន" class="text-md block w-full bg-transparent border-none text-slate-500 placeholder:text-slate-200">
            </div>
        </div>

        <!-- Items Table -->
        <table class="w-full mb-6">
            <thead>
                <tr class="border-y border-slate-200">
                    <th class="py-4 px-2 text-left w-12">ល.រ</th>
                    <th class="py-4 px-2 text-left">បរិយាយទំនិញ / Description</th>
                    <th class="py-4 px-2 text-center w-24">ចំនួន</th>
                    <th class="py-4 px-2 text-right w-32">តម្លៃរាយ</th>
                    <th class="py-4 px-4 text-right w-32">សរុប</th>
                    <th class="py-4 px-2 no-print w-10"></th>
                </tr>
            </thead>
            <tbody id="invoice-body">
                <!-- Rows added by JS -->
            </tbody>
        </table>

        <!-- Add Row Button -->
        <button onclick="addRow()" class="no-print mb-12 flex items-center gap-2 text-blue-600 font-bold text-sm hover:bg-blue-50 px-4 py-2 rounded-xl transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            បន្ថែមទំនិញ (Add Item)
        </button>

        <!-- Summary Section -->
        <div class="flex justify-end border-t-2 border-slate-50 pt-6">
            <div class="w-80 space-y-4">
                <div class="flex justify-between text-slate-400 text-sm font-bold uppercase tracking-wider">
                    <span>សរុបរង (Subtotal)</span>
                    <span id="subtotal" class="text-slate-800 font-black">$0.00</span>
                </div>
                <div class="flex justify-between items-center text-slate-400 text-sm font-bold uppercase tracking-wider">
                    <span>បញ្ចុះតម្លៃ (Discount %)</span>
                    <div class="flex items-center">
                        <input type="number" id="discount" value="0" min="0" oninput="calculate()" class="no-print w-16 text-right border-b border-slate-200 bg-transparent px-1 font-black text-slate-800">
                        <span id="discount-display" class="hidden print:inline font-black text-slate-800">0%</span>
                    </div>
                </div>
                <div class="pt-6 border-t-4 border-slate-900 flex justify-between items-center">
                    <span class="text-lg font-black text-slate-900 uppercase tracking-tighter">សរុបចុងក្រោយ</span>
                    <span id="grand-total" class="text-3xl font-black text-blue-600">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Footer Signatures -->
        <div class="absolute bottom-[20mm] left-[20mm] right-[20mm]">
            <div class="grid grid-cols-2 gap-20 text-center">
                <div class="space-y-20">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">អ្នករៀបចំ / Prepared By</p>
                    <div class="border-t border-slate-200 w-48 mx-auto"></div>
                </div>
                <div class="space-y-20">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">អតិថិជន / Customer</p>
                    <div class="border-t border-slate-200 w-48 mx-auto"></div>
                </div>
            </div>
            <p class="text-[10px] text-center text-slate-300 mt-16 uppercase tracking-[0.3em]">Thank you for your business</p>
        </div>
    </div>

    <script>
        // Set Date
        const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
        document.getElementById('inv-date').textContent = new Date().toLocaleDateString('km-KH', options);
        document.getElementById('inv-num').textContent = '#' + Math.floor(1000 + Math.random() * 9000);

        function addRow() {
            const tbody = document.getElementById('invoice-body');
            const rowCount = tbody.rows.length + 1;
            const tr = document.createElement('tr');
            tr.className = "group border-b border-slate-50 transition";
            tr.innerHTML = `
                <td class="py-5 px-2 text-slate-300 font-mono text-xs">${rowCount}</td>
                <td class="py-5 px-2">
                    <input type="text" placeholder="រាយនាមទំនិញ..." class="w-full font-bold text-slate-700 bg-transparent placeholder:text-slate-200">
                </td>
                <td class="py-5 px-2 text-center">
                    <input type="number" value="1" min="1" oninput="calculate()" class="qty-input font-black text-blue-600 bg-transparent">
                </td>
                <td class="py-5 px-2 text-right">
                    <input type="number" value="0.00" step="0.01" oninput="calculate()" class="price-input font-bold text-slate-600 bg-transparent">
                </td>
                <td class="py-5 px-4 text-right font-black text-slate-900 row-total">$0.00</td>
                <td class="py-5 px-2 no-print text-center">
                    <button onclick="this.closest('tr').remove(); calculate(); reindex();" class="text-slate-200 hover:text-red-500 transition shadow-sm p-1 rounded-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
            calculate();
        }

        function calculate() {
            let subtotal = 0;
            const rows = document.querySelectorAll('#invoice-body tr');
            
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                const price = parseFloat(row.querySelector('.price-input').value) || 0;
                const total = qty * price;
                row.querySelector('.row-total').textContent = '$' + total.toFixed(2);
                subtotal += total;
            });

            const discPerc = document.getElementById('discount').value || 0;
            const discAmt = subtotal * (discPerc / 100);
            const grandTotal = subtotal - discAmt;

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('discount-display').textContent = discPerc + '%';
            document.getElementById('grand-total').textContent = '$' + grandTotal.toFixed(2);
        }

        function reindex() {
            const rows = document.querySelectorAll('#invoice-body tr');
            rows.forEach((row, index) => {
                row.cells[0].textContent = index + 1;
            });
        }

        // Auto-add rows
        window.onload = () => {
            for(let i=0; i<3; i++) addRow();
        };
    </script>
</body>
</html>
